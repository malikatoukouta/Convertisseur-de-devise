<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertisseur de devise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <button id="themeBtn">🌙</button>
        <h1>Convertisseur de devise</h1>
        <input type="number" id="amount" placeholder="Montant">
        <select id="fromCurrency"></select>

        <button id="swapBtn" type="button">↔️ Inverser</button>

        <select id="toCurrency"></select>

        <button id="convertBtn">Convertir</button>

        <div id="loader" class="hidden">⏳ Conversion...</div>
        <p id="result"></p>
        <button id="copyBtn">📋 Copier</button>
        <p id="rateInfo"></p>

        <h2>Historique</h2>
        <ul id="historyList"></ul>

        <button id="clearHistoryBtn">Vider l'historique</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
